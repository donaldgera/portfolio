<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="fractalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#0A0A0A"/>

  <!-- Sierpinski triangle - Level 0 (outer) -->
  <g fill="url(#fractalGrad)" opacity="0.95">
    <!-- Main large triangle -->
    <polygon points="256,56 456,404 56,404" fill="none" stroke="url(#fractalGrad)" stroke-width="4"/>

    <!-- Level 1 - 3 triangles -->
    <polygon points="256,56 356,230 156,230"/>
    <polygon points="156,230 256,404 56,404"/>
    <polygon points="356,230 456,404 256,404"/>

    <!-- Level 2 - cut-outs (inverted triangles) to form Sierpinski -->
    <polygon points="256,230 356,404 156,404" fill="#0A0A0A"/>
    <polygon points="206,143 256,230 156,230" fill="#0A0A0A"/>
    <polygon points="306,143 356,230 256,230" fill="#0A0A0A"/>
    <polygon points="106,317 156,404 56,404" fill="#0A0A0A"/>
    <polygon points="306,317 356,404 256,404" fill="#0A0A0A"/>
    <polygon points="406,317 456,404 356,404" fill="#0A0A0A"/>

    <!-- Level 3 - smaller cut-outs for deeper fractal detail -->
    <!-- Top triangle sub-cuts -->
    <polygon points="231,100 256,143 206,143" fill="#0A0A0A"/>
    <polygon points="181,186 206,230 156,230" fill="#0A0A0A"/>
    <polygon points="281,186 306,230 256,230" fill="#0A0A0A"/>

    <!-- Bottom-left triangle sub-cuts -->
    <polygon points="131,273 156,317 106,317" fill="#0A0A0A"/>
    <polygon points="81,360 106,404 56,404" fill="#0A0A0A"/>
    <polygon points="181,360 206,404 156,404" fill="#0A0A0A"/>

    <!-- Bottom-right triangle sub-cuts -->
    <polygon points="331,273 356,317 306,317" fill="#0A0A0A"/>
    <polygon points="281,360 306,404 256,404" fill="#0A0A0A"/>
    <polygon points="381,360 406,404 356,404" fill="#0A0A0A"/>
  </g>

  <!-- Subtle glow effect -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#3B82F6" stroke-width="0.5" opacity="0.15"/>
</svg>
